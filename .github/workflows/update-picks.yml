name: Update Daily Research Picks

on:
  workflow_dispatch:
  schedule:
    # Runs Monday-Friday at 8:00 AM Eastern approximation.
    # GitHub cron uses UTC.
    - cron: "0 13 * * 1-5"

permissions:
  contents: write

jobs:
  update-picks:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TRADE_TICKERS: ${{ vars.TRADE_TICKERS }}
      MAX_SCAN_TICKERS: ${{ vars.MAX_SCAN_TICKERS }}
      NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
      BUILD_ROBINHOOD_UNIVERSE: ${{ vars.BUILD_ROBINHOOD_UNIVERSE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build Robinhood-compatible ticker universe
        if: ${{ env.BUILD_ROBINHOOD_UNIVERSE == 'true' }}
        run: |
          python scripts/build_robinhood_universe.py

      - name: Generate latest research picks
        run: |
          python scripts/update_picks.py

      - name: Commit updated picks
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/latest-picks.json data/robinhood-universe.json
          git diff --cached --quiet || git commit -m "Update daily research picks"
          git push

      - name: Trigger Netlify rebuild
        if: ${{ env.NETLIFY_BUILD_HOOK_URL != '' }}
        run: |
          curl -X POST "$NETLIFY_BUILD_HOOK_URL"
