name: Update Daily Research Picks

on:
  workflow_dispatch:
  schedule:
    # Runs Monday-Friday at 8:00 AM Eastern approximation.
    # GitHub cron uses UTC.
    - cron: "0 13 * * 1-5"

permissions:
  contents: write

jobs:
  update-picks:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      DATA_PROVIDER: ${{ vars.DATA_PROVIDER }}
      TRADE_TICKERS: ${{ vars.TRADE_TICKERS }}
      MAX_SCAN_TICKERS: ${{ vars.MAX_SCAN_TICKERS }}
      BUILD_ROBINHOOD_UNIVERSE: ${{ vars.BUILD_ROBINHOOD_UNIVERSE }}
      NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build Robinhood-compatible ticker universe
        if: ${{ env.BUILD_ROBINHOOD_UNIVERSE == 'true' }}
        run: |
          python scripts/build_robinhood_universe.py

      - name: Generate latest research picks
        run: |
          python scripts/update_picks.py

      - name: Check generated files
        run: |
          echo "Generated data files:"
          ls -la data || true
          git status --short

      - name: Commit updated research files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f "data/latest-picks.json" ]; then
            git add data/latest-picks.json
          fi

          if [ -f "data/robinhood-universe.json" ]; then
            git add data/robinhood-universe.json
          fi

          if [ -f "data/ticker-universe.ts" ]; then
            git add data/ticker-universe.ts
          fi

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi

          git commit -m "Update daily research picks"

      - name: Pull latest branch changes
        run: |
          git pull --rebase origin main

      - name: Push updated research files
        run: |
          git push origin main

      - name: Trigger Netlify rebuild
        if: ${{ env.NETLIFY_BUILD_HOOK_URL != '' }}
        run: |
          curl -X POST "$NETLIFY_BUILD_HOOK_URL"
