[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Netlify supports Next.js App Router and Route Handlers through its Next/OpenNext adapter.
# Add FMP_API_KEY and ALPHA_VANTAGE_API_KEY in Netlify Site settings > Environment variables.
